name: Dashboard CI

# Mirrors the backend's lint+typecheck workflow. Build step also runs
# because Next.js catches a class of errors (page-level type issues,
# bad imports) that tsc alone misses in this app layout.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'next.config.ts'
      - 'tsconfig.json'
      - 'eslint.config.mjs'
      - '.github/workflows/**'
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: 9

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm exec tsc --noEmit

      - name: ESLint
        run: pnpm exec eslint

  build:
    name: Next.js build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (skip-env so the build doesn't need real backend credentials)
        run: |
          # The build calls `git rev-parse` to embed the build badge — set
          # benign defaults so the CI runner doesn't fail when the repo
          # state differs from a normal dev checkout.
          NEXT_PUBLIC_API_URL=http://localhost:3001 pnpm run build
